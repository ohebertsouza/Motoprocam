buildscript {
    ext.kotlin_version = '1.9.0'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

subprojects { subproject ->
    subproject.plugins.withId('com.android.library') {
        def androidExtension = subproject.extensions.findByName('android')
        if (androidExtension == null) {
            return
        }

        def hasNamespaceProperty = androidExtension.hasProperty('namespace')
        def currentNamespace = hasNamespaceProperty ? androidExtension.namespace : null
        if (currentNamespace != null && currentNamespace.toString().trim()) {
            return
        }

        def manifestFile = subproject.file('src/main/AndroidManifest.xml')
        if (manifestFile.exists()) {
            def manifest = new XmlSlurper(false, false).parse(manifestFile)
            def manifestPackage = manifest.@package?.text()
            if (manifestPackage?.trim()) {
                androidExtension.namespace = manifestPackage
                return
            }
        }

        androidExtension.namespace = "dev.flutter.${subproject.name.replace('-', '_')}"
    }
}
