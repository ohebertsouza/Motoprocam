name: moto_pro_cam
description: Câmera estilo iPhone para Motorola Moto Edge 30 Neo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5+9

  # Image processing (filters, adjustments)
  image: ^4.1.7

  # Save to Android gallery
  gallery_saver: ^2.3.2

  # Permissions (camera, storage)
  permission_handler: ^11.3.1

  # Temporary directories
  path_provider: ^2.1.3

  # Splash screen polish
  flutter_native_splash: ^2.3.0

  # Face detection (portrait mode enhancements)
  google_mlkit_face_detection: ^0.13.0

  # Extra icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
